<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Frann｜動画一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #fafafa;
}

h1 { margin-bottom: 6px; }
#status { margin-bottom: 20px; color: #555; }

.video {
  margin-bottom: 40px;
  max-width: 560px;
}

.thumb {
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  background: #000;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.play {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 64px;
  color: #fff;
  background: rgba(0,0,0,0.3);
}

iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
  border-radius: 12px;
}

.title {
  margin-top: 8px;
  font-weight: bold;
}

/* 右固定ボタン */
#jumpBtn {
  position: fixed;
  right: 20px;
  bottom: 20px;
  padding: 12px 16px;
  border-radius: 999px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<h1>Frann｜動画一覧</h1>
<div id="status">読み込み中…</div>
<div id="videos"></div>

<button id="jumpBtn">再生中へ</button>

<script>
const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
const CHANNEL_ID = "UCqRV_ZIQhVKfxG1_WkNiRbg";

let currentVideoEl = null;

/* ===== 共通 ===== */
async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

/* ===== playlist ===== */
async function getUploadsPlaylistId() {
  const url =
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`;
  const data = await fetchJson(url);
  return data.items[0].contentDetails.relatedPlaylists.uploads;
}

/* ===== videos ===== */
async function getAllVideos(playlistId) {
  let out = [];
  let token = "";

  while (true) {
    const url =
      `https://www.googleapis.com/youtube/v3/playlistItems` +
      `?part=snippet&playlistId=${playlistId}&maxResults=50&key=${API_KEY}` +
      (token ? `&pageToken=${token}` : "");

    const data = await fetchJson(url);
    if (!data.items) break;

    out.push(...data.items);
    if (!data.nextPageToken) break;
    token = data.nextPageToken;
  }
  return out;
}

/* ===== 描画（高速化） ===== */
function renderVideos(videos) {
  const container = document.getElementById("videos");
  const fragment = document.createDocumentFragment();

  videos.forEach(v => {
    const snip = v.snippet;
    if (!snip?.resourceId?.videoId) return;

    const id = snip.resourceId.videoId;
    const thumb =
      snip.thumbnails?.high?.url ||
      snip.thumbnails?.medium?.url ||
      "";

    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <div class="thumb" data-id="${id}">
        <img src="${thumb}" loading="lazy">
        <div class="play">▶</div>
      </div>
      <div class="title">${snip.title}</div>
    `;

    fragment.appendChild(div);
  });

  container.appendChild(fragment);
}

/* ===== メイン ===== */
async function main() {
  try {
    const playlistId = await getUploadsPlaylistId();
    let videos = await getAllVideos(playlistId);

    videos.sort((a, b) =>
      new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt)
    );

    document.getElementById("status").innerText =
      `動画数：${videos.length}`;

    renderVideos(videos);

  } catch (e) {
    document.getElementById("status").innerText = "取得失敗";
  }
}

/* ===== 再生処理 ===== */
document.getElementById("videos").addEventListener("click", e => {
  const box = e.target.closest(".thumb");
  if (!box) return;

  const id = box.dataset.id;

  const wrapper = box.closest(".video");

  wrapper.querySelector(".thumb").outerHTML = `
    <iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
      allow="autoplay; encrypted-media" allowfullscreen>
    </iframe>
  `;

  currentVideoEl = wrapper;

  document.getElementById("jumpBtn").style.display = "block";
});

/* ===== ジャンプボタン ===== */
document.getElementById("jumpBtn").addEventListener("click", () => {
  if (!currentVideoEl) return;

  currentVideoEl.scrollIntoView({
    behavior: "smooth",
    block: "center"
  });
});

main();
</script>

</body>
</html>
