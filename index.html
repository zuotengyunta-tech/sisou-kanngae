<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>YouTube Playlist Viewer</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
}

/* メイン */
#main {
  flex: 1;
  padding: 20px;
}

#videos {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.video-item {
  cursor: pointer;
  border: 1px solid #ddd;
  padding: 10px;
  border-radius: 8px;
  transition: transform 0.1s;
}
.video-item:hover { transform: scale(1.02); }

.video-item img {
  width: 100%;
  border-radius: 6px;
}

iframe {
  width: 100%;
  max-width: 560px;
  height: 315px;
  margin-top: 20px;
}

/* 右履歴 */
#sidebar {
  width: 300px;
  border-left: 1px solid #ddd;
  padding: 10px;
  height: 100vh;
  overflow-y: auto;
}

.history-item {
  font-size: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  border-bottom: 1px solid #eee;
  padding-bottom: 6px;
}

/* ジャンプ */
#jumpBtn {
  position: fixed;
  right: 320px;
  bottom: 20px;
  padding: 10px 14px;
  border-radius: 999px;
  border: none;
  background: #000;
  color: #fff;
  cursor: pointer;
  display: none;
}
</style>
</head>

<body>

<div id="main">
  <h2>再生リストビューアー</h2>
  <div id="player"></div>
  <div id="videos">読み込み中...</div>
</div>

<div id="sidebar">
  <h3>再生履歴</h3>
  <div id="history"></div>
</div>

<button id="jumpBtn">再生中へ</button>

<script>
const apiKey = "★APIキー★";
const playlistId = "PLExT6MVBKs2BOFn2KPX6FYLQ8btIpOZ5l";

const container = document.getElementById("videos");
const player = document.getElementById("player");

let currentVideoId = null;

/* ===== API ===== */
async function fetchAllVideos(pageToken = "", allItems = []) {
  const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${playlistId}&key=${apiKey}&pageToken=${pageToken}`;
  const res = await fetch(url);
  const data = await res.json();

  if (!res.ok) throw new Error(data.error?.message || "API fetch error");

  if (data.items) allItems = allItems.concat(data.items);
  if (data.nextPageToken) return fetchAllVideos(data.nextPageToken, allItems);
  return allItems;
}

/* ===== 高速描画（分割） ===== */
function renderVideos(items) {
  container.innerHTML = "";
  let i = 0;

  function chunk() {
    const frag = document.createDocumentFragment();

    for (let c = 0; c < 20 && i < items.length; c++, i++) {
      const item = items[i];
      const title = item.snippet.title;
      const videoId = item.snippet.resourceId?.videoId;
      if (!videoId) continue;

      const thumbnail =
        item.snippet.thumbnails?.medium?.url ||
        item.snippet.thumbnails?.default?.url ||
        "";

      const div = document.createElement("div");
      div.className = "video-item";

      div.innerHTML = `
        <img src="${thumbnail}" loading="lazy">
        <p>${title}</p>
      `;

      div.onclick = () => playVideo(videoId, title);

      frag.appendChild(div);
    }

    container.appendChild(frag);

    if (i < items.length) requestAnimationFrame(chunk);
  }

  chunk();
}

/* ===== 再生 ===== */
function playVideo(videoId, title) {
  player.innerHTML = `
    <iframe
      src="https://www.youtube.com/embed/${videoId}?autoplay=1"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  `;

  currentVideoId = videoId;

  document.getElementById("jumpBtn").style.display = "block";

  saveHistory({ videoId, title });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ===== 履歴 ===== */
function loadHistory() {
  return JSON.parse(localStorage.getItem("yt_history") || "[]");
}

function saveHistory(item) {
  let h = loadHistory();
  h.unshift(item);
  h = h.slice(0, 30);
  localStorage.setItem("yt_history", JSON.stringify(h));
  renderHistory();
}

function renderHistory() {
  const h = loadHistory();
  const box = document.getElementById("history");
  box.innerHTML = "";

  h.forEach(v => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.textContent = v.title;

    div.onclick = () => playVideo(v.videoId, v.title);

    box.appendChild(div);
  });
}

/* ===== ジャンプ ===== */
document.getElementById("jumpBtn").onclick = () => {
  if (!currentVideoId) return;
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

/* ===== init ===== */
fetchAllVideos()
  .then(items => {
    renderVideos(items);
    renderHistory();
  })
  .catch(err => {
    container.innerText = "APIエラー: " + err.message;
  });

</script>

</body>
</html>
