<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Frann｜動画一覧</title>

<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #fafafa;
}
h1 { margin-bottom: 6px; }
#status { margin-bottom: 20px; color: #555; }

.video {
  margin-bottom: 40px;
  max-width: 560px;
}

.thumb {
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  background: #000;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.play {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 64px;
  color: #fff;
  background: rgba(0,0,0,0.3);
}

iframe {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: none;
  border-radius: 12px;
}

.title {
  margin-top: 8px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>Frann｜動画一覧</h1>
<div id="status">読み込み中…</div>
<div id="videos"></div>

<script>
/* ===== 設定 ===== */
const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
const CHANNEL_ID = "UCqRV_ZIQhVKfxG1_WkNiRbg"; // Fラン就職チャンネル

/* ===== 共通 ===== */
async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

/* ===== アップロードリスト取得 ===== */
async function getUploadsPlaylistId(channelId) {
  const url =
    `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}&key=${API_KEY}`;
  const data = await fetchJson(url);
  return data.items[0].contentDetails.relatedPlaylists.uploads;
}

/* ===== 動画一覧取得 ===== */
async function getAllVideos(playlistId) {
  let videos = [];
  let pageToken = "";

  while (true) {
    const url =
      `https://www.googleapis.com/youtube/v3/playlistItems` +
      `?part=snippet&playlistId=${playlistId}` +
      `&maxResults=50&key=${API_KEY}` +
      (pageToken ? `&pageToken=${pageToken}` : "");

    const data = await fetchJson(url);

    if (!data.items) break;
    videos.push(...data.items);

    if (!data.nextPageToken) break;
    pageToken = data.nextPageToken;
  }

  return videos;
}

/* ===== メイン ===== */
async function main() {
  try {
    const playlistId = await getUploadsPlaylistId(CHANNEL_ID);
    const videos = await getAllVideos(playlistId);

    if (!videos.length) {
      document.getElementById("status").innerText = "動画が取得できません";
      return;
    }

    /* 新しい順に並び替え */
    videos.sort((a, b) =>
      new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt)
    );

    document.getElementById("status").innerText =
      `動画数：${videos.length}`;

    const container = document.getElementById("videos");

    videos.forEach(v => {
      const snip = v.snippet;
      if (!snip?.resourceId?.videoId) return;

      const id = snip.resourceId.videoId;
      const title = snip.title;

      const thumb =
        snip.thumbnails?.high?.url ||
        snip.thumbnails?.medium?.url ||
        snip.thumbnails?.default?.url ||
        "";

      container.insertAdjacentHTML("beforeend", `
        <div class="video">
          <div class="thumb" data-id="${id}">
            <img src="${thumb}" alt="">
            <div class="play">▶</div>
          </div>
          <div class="title">${title}</div>
        </div>
      `);
    });

    /* クリックで再生 */
    container.addEventListener("click", e => {
      const box = e.target.closest(".thumb");
      if (!box) return;

      const id = box.dataset.id;

      box.outerHTML = `
        <iframe
          src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>
      `;
    });

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText =
      "読み込み失敗（APIキー制限 or quota超過）";
  }
}

main();
</script>

</body>
</html>
