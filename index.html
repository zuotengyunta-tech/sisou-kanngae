<script>
  /* ===== иЁӯе®ҡ ===== */
  const API_KEY = "AIzaSyAxk1YpQSe-qDtFUSUmnjnduanag41Mlyk";
  const PLAYLIST_ID = "PLExT6MVBKs2CzmEcSCpaSQP_u7XONu6kD";

  async function fetchJson(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function getAllVideos(playlistId) {
    let videos = [];
    let pageToken = "";

    while (true) {
      const url =
        `https://www.googleapis.com/youtube/v3/playlistItems` +
        `?part=snippet&playlistId=${playlistId}` +
        `&maxResults=50&key=${API_KEY}` +
        (pageToken ? `&pageToken=${pageToken}` : "");

      const data = await fetchJson(url);
      videos.push(...(data.items || []));

      if (!data.nextPageToken) break;
      pageToken = data.nextPageToken;
    }
    return videos;
  }

  async function main() {
    try {
      const videos = await getAllVideos(PLAYLIST_ID);

      document.getElementById("status").innerText =
        `еӢ•з”»ж•°пјҡ${videos.length}`;

      const container = document.getElementById("videos");

      videos.forEach(v => {
        if (!v.snippet?.resourceId) return;

        const id = v.snippet.resourceId.videoId;
        const title = v.snippet.title;
        const thumb = v.snippet.thumbnails.high.url;

        container.insertAdjacentHTML("beforeend", `
          <div class="video">
            <div class="thumb" data-id="${id}">
              <img src="${thumb}" alt="">
              <div class="play">в–¶</div>
            </div>
            <div class="title">${title}</div>
          </div>
        `);
      });

      container.addEventListener("click", e => {
        const box = e.target.closest(".thumb");
        if (!box) return;

        const id = box.dataset.id;
        box.outerHTML = `
          <iframe
            src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
            allow="accelerometer; autoplay; encrypted-media; picture-in-picture"
            allowfullscreen>
          </iframe>
        `;
      });

    } catch (err) {
      console.error(err);
      document.getElementById("status").innerText =
        "иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹпјҲAPIгӮӯгғјеҲ¶йҷҗгғ»гӮігғігӮҪгғјгғ«зўәиӘҚпјү";
    }
  }

  main();
</script>
